version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow_db
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      USE_SQLITE: "false"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskflow_db
      DB_USER: taskflow
      DB_PASSWORD: taskflow_secret
      JWT_SECRET: change_this_in_production_please
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  # Frontend (dev mode)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data:
  uploads_data:
